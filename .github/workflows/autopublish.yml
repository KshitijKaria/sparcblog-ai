name: Daily Auto-Publish

on:
  schedule:
    # 5 PM ET = 9 PM UTC
    - cron: '0 21 * * *'
  workflow_dispatch: # allows manual trigger from GitHub UI

jobs:
  autopublish:
    runs-on: ubuntu-latest
    steps:
      - name: Wake up Render backend
        run: |
          echo "Waking up backend..."
          curl -s -o /dev/null -w "%{http_code}" ${{ secrets.BACKEND_URL }}/api/stats || true
          echo "Waiting 30s for server to fully start..."
          sleep 30

      - name: Trigger auto-publish pipeline
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST ${{ secrets.BACKEND_URL }}/api/blog/autopublish)
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          echo "Response: $BODY"
          echo "HTTP Code: $HTTP_CODE"
          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "Auto-publish failed!"
            exit 1
          fi
          echo "Auto-publish triggered successfully!"
